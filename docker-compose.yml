# =============================================================================
# docker-compose.yml — Tinemu Production Stack
# Services: app (Next.js), db (PostgreSQL 16), nginx (reverse proxy)
# =============================================================================

version: "3.9"

services:
  # ---- Next.js Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tinemu/app:latest
    container_name: tinemu-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NODE_ENV=production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tinemu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: tinemu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tinemu_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-tinemu_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - tinemu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tinemu_user} -d ${POSTGRES_DB:-tinemu_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:1.27-alpine
    container_name: tinemu-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - tinemu-network

volumes:
  postgres-data:
    driver: local
  certbot-www:
    driver: local

networks:
  tinemu-network:
    driver: bridge
